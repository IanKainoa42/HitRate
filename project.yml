name: HitRate
options:
  bundleIdPrefix: com.ianrichardson
  deploymentTarget:
    iOS: 17.0
    watchOS: 10.0
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.0
configs:
  Debug: debug
  Release: release
targets:
  HitRate:
    type: application
    platform: iOS
    sources:
      - path: HitRate
    dependencies:
      - target: HitRateWatch
        embed: true
        platformFilters: [ios]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ianrichardson.HitRate
        PRODUCT_NAME: HitRate
        CURRENT_PROJECT_VERSION: 9
        MARKETING_VERSION: "1.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: WC46K49VFA
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: YES
    info:
      path: HitRate/Info.plist
      properties:
        CFBundleDisplayName: HitRate
        # Wire the plist version to the build settings so bumping
        # CURRENT_PROJECT_VERSION / MARKETING_VERSION in this file actually
        # changes the built binary (xcodegen otherwise hardcodes "1"/"1.0").
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIAppFonts:
          - SpaceGrotesk-Regular.ttf
          - SpaceGrotesk-Medium.ttf
          - SpaceGrotesk-Bold.ttf
          - BarlowCondensed-SemiBold.ttf
          - BarlowCondensed-Bold.ttf
          - BarlowCondensed-ExtraBold.ttf
        NSPhotoLibraryAddUsageDescription: HitRate saves your stunt cards to Photos so you can post them.
        LSApplicationQueriesSchemes:
          - instagram
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
  HitRateWatch:
    type: application
    platform: watchOS
    sources:
      - path: HitRateWatch
      - path: HitRate/WatchSync/WatchPayloads.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ianrichardson.HitRate.watchkitapp
        PRODUCT_NAME: HitRate
        CURRENT_PROJECT_VERSION: 9
        MARKETING_VERSION: "1.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: WC46K49VFA
        TARGETED_DEVICE_FAMILY: "4"
    info:
      path: HitRateWatch/Info.plist
      properties:
        CFBundleDisplayName: HitRate
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.ianrichardson.HitRate
        ITSAppUsesNonExemptEncryption: false
