<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width:1320px; height:2868px; overflow:hidden;
    background: radial-gradient(ellipse 120% 60% at 50% -10%, #16204a 0%, #0a0f1e 55%, #070b16 100%);
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
    color:#fff; text-align:center; position:relative;

  .stars { position:absolute; inset:0; opacity:.5;
    background-image: radial-gradient(1.5px 1.5px at 12% 8%, #fff 50%, transparent 51%),
      radial-gradient(2px 2px at 78% 14%, #aab8ff 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 32% 19%, #fff 50%, transparent 51%),
      radial-gradient(1px 1px at 60% 6%, #fff 50%, transparent 51%),
      radial-gradient(2px 2px at 90% 24%, #fff 50%, transparent 51%),
      radial-gradient(1.5px 1.5px at 8% 28%, #aab8ff 50%, transparent 51%); }
  h1 { padding-top:170px; font-size:118px; font-weight:800; letter-spacing:-1px; position:relative; }
  h1 .accent { color:#34e07e; }
  p { margin-top:36px; font-size:48px; font-weight:500; color:#9aa6c0; position:relative; }
  .shot { position:absolute; left:50%; transform:translateX(-50%); top:640px; width:1100px;
    border-radius:54px; border:3px solid rgba(255,255,255,.14);
    box-shadow: 0 -8px 90px rgba(52,224,126,.18), 0 30px 80px rgba(0,0,0,.6); }
</style></head>
<body>

  <h1>Know your <span class="accent">hit rate</span>.</h1>
