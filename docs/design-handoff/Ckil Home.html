<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ckil — home</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
<style>
  :root{
    /* App UI register — FormationFlow tokens */
    --app-bg:#F2F2F7; --surface:#FFFFFF; --surface-2:#FBFBFD;
    --label:#000; --label2:rgba(60,60,67,.6); --label3:rgba(60,60,67,.3);
    --sep:rgba(60,60,67,.16); --hairline:rgba(0,0,0,.06); --grid:#C7C7CC;
    --accent:#007AFF; --accent-press:#0062CC; --accent-tint:rgba(0,122,255,.12);
    --destructive:#FF3B30; --warning:#FF9500; --success:#34C759;
    --fill:rgba(120,120,128,.12); --fill2:rgba(120,120,128,.16);
    --shadow-card:0 1px 3px rgba(0,0,0,.06);
    --shadow-float:0 8px 24px rgba(0,0,0,.16);
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,"Segoe UI",sans-serif;
    --rounded:-apple-system,ui-rounded,"SF Pro Rounded",system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
    /* Brand register — share-card "court at night" */
    --navy:#0A0F1E; --navy-deep:#06090F; --navy-mid:#111827; --navy-light:#1C2A40;
    --coral:#FF4757; --coral-light:#FF6B7A; --electric:#00D4FF; --electric-dim:#0099CC;
    --gold:#FFD43B; --brand-green:#51CF66; --brand-purple:#9775FA;
    --display:"Space Grotesk",system-ui,sans-serif;
    --body:"Inter",-apple-system,system-ui,sans-serif;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    font-family:var(--font);
    background:
      radial-gradient(120% 80% at 50% -10%, #fbfbfd 0%, #e9e9ef 55%, #e3e3ea 100%);
    -webkit-font-smoothing:antialiased;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  #stage{ transform-origin:center center; }
  #root{ display:flex; align-items:center; justify-content:center; }

  /* ---- mechanical counter ---- */
  .odo{ display:flex; align-items:center; justify-content:center; }
  .odo-col{
    position:relative; overflow:hidden;
    width:var(--dw); height:var(--dh);
  }
  .odo-reel{
    position:absolute; left:0; top:0; width:100%;
    will-change:transform;
  }
  .odo-cell{
    height:var(--dh); width:100%;
    display:flex; align-items:center; justify-content:center;
    font:800 var(--ds)/1 var(--rounded);
    font-variant-numeric:tabular-nums; letter-spacing:-.02em;
    color:var(--label);
  }
  .odo-col.ghost .odo-cell{ color:var(--label3); }

  /* subtle mechanical seam across the number window */
  .odo-window{ position:relative; }
  .odo-window::after{
    content:""; position:absolute; left:6%; right:6%; top:50%; height:1px;
    background:linear-gradient(90deg,transparent,rgba(0,0,0,.07) 18%,rgba(0,0,0,.07) 82%,transparent);
    pointer-events:none;
  }

  /* flip + pop styles share the single-number node */
  .flipnum, .popnum{
    font:800 var(--ds)/1 var(--rounded);
    font-variant-numeric:tabular-nums; letter-spacing:-.03em; color:var(--label);
    display:inline-block;
  }
  @keyframes flipIn{
    0%{ transform:rotateX(-90deg); opacity:0; }
    100%{ transform:rotateX(0deg); opacity:1; }
  }
  .flip-anim{ animation:flipIn .26s cubic-bezier(.2,.7,.2,1); transform-origin:center top; }
  @keyframes popIn{
    0%{ transform:scale(.6); opacity:.2; }
    60%{ transform:scale(1.12); opacity:1; }
    100%{ transform:scale(1); }
  }
  .pop-anim{ animation:popIn .26s cubic-bezier(.2,.8,.2,1); }

  /* tap pad press feedback */
  .pad{ -webkit-tap-highlight-color:transparent; user-select:none; cursor:pointer; touch-action:manipulation; }
  .pad.press{ transform:scale(.975); }

  @keyframes ringFlash{
    0%{ filter:drop-shadow(0 0 0 rgba(52,199,89,0)); }
    35%{ filter:drop-shadow(0 0 10px rgba(52,199,89,.7)); }
    100%{ filter:drop-shadow(0 0 0 rgba(52,199,89,0)); }
  }
  .ring-flash{ animation:ringFlash .7s ease-out; }

  @keyframes risePip{ from{ transform:translateY(14px); opacity:0; } to{ transform:translateY(0); opacity:1; } }
  .rise{ animation:risePip .32s cubic-bezier(.2,.7,.2,1); }

  /* sheet */
  .sheet-scrim{ position:absolute; inset:0; background:rgba(0,0,0,.28); z-index:80;
    opacity:0; transition:opacity .26s ease; }
  .sheet-scrim.in{ opacity:1; }
  .sheet{
    position:absolute; left:0; right:0; bottom:0; z-index:81;
    background:var(--surface); border-radius:22px 22px 0 0;
    box-shadow:0 -8px 40px rgba(0,0,0,.22);
    transform:translateY(100%); transition:transform .3s cubic-bezier(.2,.8,.2,1);
    padding:10px 18px calc(18px + env(safe-area-inset-bottom));
    max-height:88%; overflow:auto;
  }
  .sheet.in{ transform:translateY(0); }
  .grabber{ width:38px; height:5px; border-radius:3px; background:var(--label3); margin:0 auto 8px; }

  .field{
    width:100%; font:400 17px/1.3 var(--font); padding:11px 13px;
    border:1px solid var(--sep); border-radius:10px; background:var(--surface-2);
    color:var(--label); resize:none; outline:none;
  }
  .field:focus{ border-color:var(--accent); background:#fff; }

  .scrollfeed{ overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .scrollfeed::-webkit-scrollbar{ width:0; height:0; }

  button{ font-family:var(--font); }
  .no-tap{ -webkit-tap-highlight-color:transparent; }

  /* ============================ Pokémon-style holo share cards ========= */
  .share-cover{ position:absolute; inset:0; z-index:90; overflow:hidden;
    background:
      radial-gradient(120% 70% at 50% -8%, #1b2335 0%, #0c1120 46%, #06080f 100%);
    opacity:0; transition:opacity .32s ease; }
  .share-cover.in{ opacity:1; }
  .share-cover::before{ content:""; position:absolute; inset:0; pointer-events:none;
    background:
      linear-gradient(var(--brand-grid,rgba(255,255,255,.05)) 1px, transparent 1px) 0 0/30px 30px,
      linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px) 0 0/30px 30px;
    mask:radial-gradient(120% 90% at 50% 30%, #000 35%, transparent 78%);
    -webkit-mask:radial-gradient(120% 90% at 50% 30%, #000 35%, transparent 78%); }
  .share-cover::after{ content:""; position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(40% 30% at 18% 14%, rgba(255,71,87,.30), transparent 70%),
      radial-gradient(44% 32% at 86% 80%, rgba(0,212,255,.24), transparent 72%); }

  .holo-rail{ display:flex; gap:18px; overflow-x:auto; scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch; padding:0 56px; align-items:center; }
  .holo-rail::-webkit-scrollbar{ display:none; }
  .holo-slide{ scroll-snap-align:center; flex:0 0 auto; }

  .holo-shell{ perspective:900px; width:290px; height:430px; }
  .holo-card{ position:relative; width:100%; height:100%; border-radius:20px;
    transform-style:preserve-3d; transition:transform .25s cubic-bezier(.2,.7,.2,1);
    will-change:transform; }
  .holo-frame{ position:absolute; inset:0; border-radius:20px; padding:8px;
    box-shadow:0 22px 60px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.06);
    background-size:300% 300%; animation:foilEdge 7s linear infinite; }
  @keyframes foilEdge{ 0%{background-position:0% 50%} 100%{background-position:300% 50%} }
  .holo-inner{ position:relative; width:100%; height:100%; border-radius:13px; overflow:hidden;
    background:linear-gradient(160deg, #141a2b 0%, #0d1322 55%, #0a0f1e 100%);
    display:flex; flex-direction:column; }
  .holo-inner::before{ content:""; position:absolute; inset:0; pointer-events:none; opacity:.5;
    background:
      linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px) 0 0/22px 22px,
      linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px) 0 0/22px 22px;
    mask:radial-gradient(80% 60% at 50% 38%, #000 30%, transparent 75%);
    -webkit-mask:radial-gradient(80% 60% at 50% 38%, #000 30%, transparent 75%); }

  /* foil sheen — position driven by --mx/--my, intensity by --foil */
  .holo-foil{ position:absolute; inset:0; border-radius:13px; pointer-events:none; z-index:6;
    mix-blend-mode:color-dodge; opacity:calc(.30 + var(--foil,0)*.55); transition:opacity .25s;
    background:
      linear-gradient(115deg, transparent 22%, rgba(255,255,255,.45) 42%, rgba(255,120,180,.4) 50%,
        rgba(120,220,255,.4) 58%, transparent 78%);
    background-size:230% 230%;
    background-position:calc(var(--mx,50%)*1) calc(var(--my,50%)*1); }
  .holo-foil.tier-legendary{ background:
      linear-gradient(115deg, transparent 18%, rgba(255,235,140,.6) 38%, rgba(255,255,255,.7) 50%,
        rgba(255,200,90,.6) 62%, transparent 82%); }
  .holo-foil.tier-holo{ background:
      conic-gradient(from 210deg at var(--mx,50%) var(--my,50%), #ff4d6d, #ffd43b, #51ff9f, #00d4ff, #9775fa, #ff4d6d); }
  .holo-glare{ position:absolute; inset:0; border-radius:13px; pointer-events:none; z-index:7;
    mix-blend-mode:screen; opacity:var(--foil,0); transition:opacity .25s;
    background:radial-gradient(120px 120px at var(--mx,50%) var(--my,50%), rgba(255,255,255,.55), transparent 60%); }
  .holo-sparkle{ position:absolute; inset:0; border-radius:13px; pointer-events:none; z-index:5;
    mix-blend-mode:overlay; opacity:calc(.25 + var(--foil,0)*.4);
    background-image:radial-gradient(rgba(255,255,255,.9) 1px, transparent 1.4px);
    background-size:14px 14px;
    mask:linear-gradient(115deg, transparent 30%, #000 48%, transparent 66%);
    -webkit-mask:linear-gradient(115deg, transparent 30%, #000 48%, transparent 66%);
    -webkit-mask-position:calc(var(--mx,50%)*1) 0; mask-position:calc(var(--mx,50%)*1) 0; }

  @media (prefers-reduced-motion: reduce){ .holo-frame{ animation:none; } }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="stage"><div id="root"></div></div>

  <script type="text/babel" data-src="ios-frame.jsx">
// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)

/* BEGIN USAGE */
// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports (to window): IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard
//
// Usage — wrap your screen content in <IOSDevice> to get the bezel, status bar
// and home indicator (props: title, dark, keyboard):
//
//   <IOSDevice title="Settings">
//     ...your screen content...
//   </IOSDevice>
//   <IOSDevice dark title="Search" keyboard>…</IOSDevice>
/* END USAGE */

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>

          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {

    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;

    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }

  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
  <script type="text/babel" data-src="ckil-review-core.jsx">
// ckil-review-core.jsx — mechanical numbers, the bar, icons + the reconciled
// mock dataset that every section of the Review screen reads from.
const { useState, useEffect, useRef, useLayoutEffect, useMemo } = React;

/* ===================================================== Odometer reel ===== */
function OdoDigit({ n, h, w, fs, color, rep = 18 }) {
  const REP = rep;
  const BASE = 10 * Math.floor(REP / 2);
  const reelRef = useRef(null);
  const prevN = useRef(n);
  const pos = useRef(BASE + ((n % 10) + 10) % 10);
  useLayoutEffect(() => {
    const el = reelRef.current; if (!el) return;
    const delta = n - prevN.current; prevN.current = n;
    if (delta === 0) { el.style.transition = 'none'; el.style.transform = `translateY(${-pos.current * h}px)`; return; }
    pos.current += delta;
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    el.style.transition = reduce ? 'none' : `transform .5s cubic-bezier(.2,.85,.25,1)`;
    el.style.transform = `translateY(${-pos.current * h}px)`;
    if (pos.current < 30 || pos.current > REP * 10 - 30) {
      const rebase = () => {
        const base = BASE + ((pos.current % 10) + 10) % 10;
        el.style.transition = 'none'; el.style.transform = `translateY(${-base * h}px)`;
        pos.current = base; void el.offsetHeight; el.removeEventListener('transitionend', rebase);
      };
      el.addEventListener('transitionend', rebase);
    }
  }, [n, h]);
  const cells = [];
  for (let i = 0; i < REP * 10; i++)
    cells.push(<div key={i} className="odo-cell" style={{ height: h, fontSize: fs, color }}>{i % 10}</div>);
  return (
    <div className="odo-col" style={{ width: w, height: h, '--dh': h + 'px' }}>
      <div className="odo-reel" ref={reelRef} style={{ transform: `translateY(${-pos.current * h}px)` }}>{cells}</div>
    </div>
  );
}

function NumberDisplay({ value, size = 34, color = 'var(--label)', minDigits = 1, style = 'Odometer', weight, rep }) {
  const v = Math.max(0, Math.round(value || 0));
  const str = String(v);
  const digits = Math.max(minDigits, str.length);
  if (style === 'Odometer') {
    const h = Math.round(size * 1.16), w = Math.round(size * 0.62), fs = size;
    const cols = [];
    for (let p = digits - 1; p >= 0; p--) {
      const placeN = Math.floor(v / Math.pow(10, p));
      const isLeadGhost = p > 0 && v < Math.pow(10, p);
      cols.push(
        <div key={p} className={'odo-col-wrap' + (isLeadGhost ? ' ghost' : '')} style={{ opacity: isLeadGhost ? 0.22 : 1, transition: 'opacity .3s' }}>
          <OdoDigit n={placeN} h={h} w={w} fs={fs} color={color} rep={rep} />
        </div>
      );
    }
    return <div className="odo odo-window" style={{ height: h }}>{cols}</div>;
  }
  const cls = style === 'Pop' ? 'popnum pop-anim' : 'flipnum flip-anim';
  return (
    <span key={v} className={cls} style={{ fontSize: size, color, fontWeight: weight || 800, lineHeight: 1, perspective: 400 }}>
      {str.padStart(digits, '0').split('').map((d, i) => (
        <span key={i} style={{ opacity: (i < digits - str.length) ? 0.22 : 1 }}>{d}</span>
      ))}
    </span>
  );
}

/* ================================================== Stacked dist. bar ===== */
function StackedBar({ outcomes, counts, total, height = 13, radius = 999 }) {
  return (
    <div style={{ height, borderRadius: radius, background: 'var(--fill)', overflow: 'hidden', display: 'flex', boxShadow: 'inset 0 0 0 1px rgba(0,0,0,.04)' }}>
      {total === 0 ? null : outcomes.map(o => {
        const w = (counts[o.id] || 0) / total;
        if (w === 0) return null;
        return <div key={o.id} style={{ width: (w * 100) + '%', background: o.color, transition: 'width .5s cubic-bezier(.2,.8,.25,1)' }} />;
      })}
    </div>
  );
}

/* =============================================================== icons ==== */
function Icon({ name, size = 22, color = 'currentColor', sw = 2 }) {
  const p = { fill: 'none', stroke: color, strokeWidth: sw, strokeLinecap: 'round', strokeLinejoin: 'round' };
  const paths = {
    chevL: <g {...p}><path d="m15 6-6 6 6 6" /></g>,
    chevR: <g {...p}><path d="m9 6 6 6-6 6" /></g>,
    share: <g {...p}><path d="M12 3v13M8 7l4-4 4 4M5 13v6a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-6" /></g>,
    download: <g {...p}><path d="M12 3v12M8 11l4 4 4-4M5 19h14" /></g>,
    ellipsis: <g fill={color}><circle cx="5" cy="12" r="1.6" /><circle cx="12" cy="12" r="1.6" /><circle cx="19" cy="12" r="1.6" /></g>,
    up: <g {...p}><path d="M12 19V5M6 11l6-6 6 6" /></g>,
    down: <g {...p}><path d="M12 5v14M6 13l6 6 6-6" /></g>,
    flame: <g {...p}><path d="M12 3c1 3 4 4 4 8a4 4 0 0 1-8 0c0-1 .5-2 1-2.5C9 11 9 9 12 3Z" /></g>,
    alert: <g {...p}><path d="M12 3 2 20h20L12 3Z" /><path d="M12 10v4M12 17.5v.2" /></g>,
    trophy: <g {...p}><path d="M7 4h10v4a5 5 0 0 1-10 0V4ZM7 6H4v2a3 3 0 0 0 3 3M17 6h3v2a3 3 0 0 1-3 3M9 18h6M10 18v-2M14 18v-2M8 21h8" /></g>,
    clock: <g {...p}><circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 2" /></g>,
  };
  return <svg width={size} height={size} viewBox="0 0 24 24" style={{ display: 'block' }}>{paths[name]}</svg>;
}

/* ============================================== reconciled mock data ====== */
const OUTCOMES = [
  { id: 'hit', label: 'Hit', short: 'HIT', color: '#34C759', isHit: true },
  { id: 'bob', label: 'Bobble', short: 'BOB', color: '#FFCC00', isHit: false },
  { id: 'bf', label: 'Building fall', short: 'BF', color: '#FF9500', isHit: false },
  { id: 'mf', label: 'Major fall', short: 'MF', color: '#FF3B30', isHit: false },
];
const GCOLORS = ['#007AFF', '#34C759', '#FF9500', '#AF52DE', '#FF2D55', '#5AC8FA', '#FFCC00'];
// base = TODAY. Each row: [hit, bobble, building fall, major fall] + last-session delta.
const BASE = [
  { n: 1, name: 'Group 1', c: [23, 2, 0, 0], d: +2 },
  { n: 2, name: 'Group 2', c: [22, 4, 1, 1], d: +5 },
  { n: 3, name: 'Group 3', c: [21, 3, 2, 1], d: -1 },
  { n: 4, name: 'Group 4', c: [15, 4, 2, 1], d: +4 },
  { n: 5, name: 'Group 5', c: [11, 5, 4, 2], d: -6 },
  { n: 6, name: 'Group 6', c: [19, 4, 2, 1], d: -2 },
  { n: 7, name: 'Group 7', c: [16, 3, 1, 1], d: +3 },
];
const TF = {
  today: { factor: 1, label: 'Today', range: 'last 8 sessions', delta: '+6', dnote: 'vs last session',
           trend: [60, 66, 63, 70, 69, 72, 71, 74] },
  week:  { factor: 3.75, label: 'This week', range: 'last 4 weeks', delta: '+3', dnote: 'vs last week',
           trend: [66, 70, 68, 71] },
  all:   { factor: 14.6, label: 'All season', range: 'all season', delta: '+8', dnote: 'since Sept',
           trend: [57, 60, 62, 61, 65, 66, 68, 69] },
};

function buildData(tf) {
  const f = TF[tf].factor;
  const groups = BASE.map((g, i) => {
    const c = g.c.map(x => Math.round(x * f));
    const total = c.reduce((a, b) => a + b, 0);
    const hits = c[0];
    const counts = {}; OUTCOMES.forEach((o, k) => counts[o.id] = c[k]);
    return { ...g, idx: i, color: GCOLORS[i % GCOLORS.length], c, counts, total, hits,
             rate: total ? Math.round(hits / total * 100) : 0 };
  });
  const overall = {}; OUTCOMES.forEach(o => overall[o.id] = 0);
  let total = 0, hits = 0;
  groups.forEach(g => { OUTCOMES.forEach(o => overall[o.id] += g.counts[o.id]); total += g.total; hits += g.hits; });
  const rate = total ? Math.round(hits / total * 100) : 0;
  const falls = overall.bf + overall.mf;
  const worstFalls = groups.slice().sort((a, b) => (b.counts.bf + b.counts.mf) - (a.counts.bf + a.counts.mf))[0];
  const topMiss = OUTCOMES.filter(o => !o.isHit).sort((a, b) => overall[b.id] - overall[a.id])[0];
  const ranked = groups.slice().sort((a, b) => b.rate - a.rate);
  return { groups, ranked, overall, total, hits, rate, falls, worstFalls, topMiss,
           best: ranked[0], worst: ranked[ranked.length - 1], ...TF[tf] };
}

const rateColor = (r, has = true) => !has ? 'var(--label3)' : r >= 75 ? '#34C759' : r >= 55 ? '#FF9500' : '#FF3B30';

window.CkilReview = { NumberDisplay, OdoDigit, StackedBar, Icon, OUTCOMES, GCOLORS, buildData, rateColor, TF };

// number shown twice: Summary (rate+bar+counts) · Trend · Groups (ranked⇄grid)
// · Takeaways · Timeline.

const { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakColor } = window;

}/*EDITMODE-END*/;

/* ----------------------------------------------------------- atoms ------- */
function Card({ children, style }) {

}
function CardHead({ title, right }) {

function Seg({ options, value, onChange, small }) {

              background: on ? 'var(--surface)' : 'transparent', color: on ? 'var(--label)' : 'var(--label2)',
              boxShadow: on ? '0 1px 2px rgba(0,0,0,.13)' : 'none', transition: 'background .15s' }}>
            {o.l ?? o}
          </button>
        );
      })}
    </div>
  );
}

/* -------------------------------------------------------- line chart ----- */
function LineChart({ data, accent }) {
  const W = 340, H = 116, padX = 10, padTop = 12, padBot = 22;
  const min = Math.min(...data) - 5, max = Math.max(...data) + 5;
  const n = data.length;
  const X = i => padX + (i / (n - 1)) * (W - padX * 2);
  const Y = v => padTop + (1 - (v - min) / (max - min)) * (H - padTop - padBot);
  const line = data.map((v, i) => `${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');
  const area = `M${X(0)},${H - padBot} L` + data.map((v, i) => `${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' L') + ` L${X(n - 1)},${H - padBot} Z`;
  const lo = Math.min(...data), hi = Math.max(...data);
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{ display: 'block', overflow: 'visible' }}>
      {[0, 0.5, 1].map(g => { const y = padTop + g * (H - padTop - padBot); return <line key={g} x1={padX} y1={y} x2={W - padX} y2={y} stroke="var(--sep)" strokeWidth="1" strokeDasharray="2 5" />; })}
      <path d={area} fill={accent} opacity="0.08" />
      <polyline points={line} fill="none" stroke={accent} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
      {data.map((v, i) => {
        const last = i === n - 1;
        return <circle key={i} cx={X(i)} cy={Y(v)} r={last ? 4.5 : 2.6} fill={last ? accent : 'var(--surface)'} stroke={accent} strokeWidth={last ? 2 : 2} />;
      })}
      <text x={X(n - 1)} y={Y(hi) - 9} textAnchor="end" style={{ font: '800 13px/1 var(--rounded)', fill: accent }}>{data[n - 1]}%</text>
    </svg>
  );
}

/* ------------------------------------------------- groups: ranked -------- */
function RankedRow({ g, rank, last }) {
  const arrowUp = g.d >= 0;
  return (

/* ------------------------------------------------- groups: heatmap ------- */
function Heatmap({ groups }) {
  const maxByCol = {};
  OUTCOMES.forEach(o => { maxByCol[o.id] = Math.max(1, ...groups.map(g => g.counts[o.id])); });
  return (
    <div>

          </div>

          {OUTCOMES.map(o => {

            const t = v / maxByCol[o.id];
            const bg = v === 0 ? 'var(--surface-2)' : o.color + Math.round(28 + t * 227).toString(16).padStart(2, '0');
            return (

        <span style={{ font: '600 10px/1 var(--font)', color: 'var(--label3)' }}>fewer</span>
        {[0.15, 0.4, 0.65, 0.9].map((t, i) => <span key={i} style={{ width: 18, height: 14, borderRadius: 3, background: '#8E8E93' + Math.round(28 + t * 227).toString(16).padStart(2, '0') }} />)}
        <span style={{ font: '600 10px/1 var(--font)', color: 'var(--label3)' }}>more misses</span>
      </div>
    </div>
  );
}

/* ----------------------------------------------------------- tape -------- */
const TAPE = (() => {
  // a representative chronology of the latest session, one rough patch mid-way
  const seq = [];
  const pick = () => { const r = Math.random(); return r < 0.72 ? 'hit' : r < 0.85 ? 'bob' : r < 0.94 ? 'bf' : 'mf'; };
  for (let i = 0; i < 46; i++) {
    let id = pick();
    if (i >= 24 && i < 31) id = Math.random() < 0.62 ? (Math.random() < 0.5 ? 'bf' : 'mf') : 'bob';
    seq.push(id);

  return seq;
})();

            </div>
            <StackedBar outcomes={OUTCOMES} counts={d.overall} total={d.total} height={14} />
            <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0,1fr) minmax(0,1fr)', gap: '8px 16px', marginTop: 13 }}>
              {OUTCOMES.map(o => (
                <div key={o.id} style={{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 0 }}>
                  <span style={{ width: 9, height: 9, borderRadius: '50%', background: o.color, flexShrink: 0 }} />
                  <span style={{ flex: 1, minWidth: 0, font: '500 13px/1.1 var(--font)', color: 'var(--label)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{o.label}</span>
                  <span style={{ font: '700 14px/1 var(--rounded)', color: 'var(--label)', fontVariantNumeric: 'tabular-nums' }}>{d.overall[o.id]}</span>
                  <span style={{ font: '500 11px/1 var(--font)', color: 'var(--label3)', width: 30, textAlign: 'right' }}>{Math.round(d.overall[o.id] / d.total * 100)}%</span>
                </div>
              ))}
            </div>
          </Card>

          {/* TREND — owns the over-time line */}
          <Card>
            <CardHead title="HIT RATE OVER TIME" right={<span style={{ font: '500 11px/1 var(--font)', color: 'var(--label2)' }}>{d.range}</span>} />
            <LineChart data={d.trend} accent={t.accent} />
          </Card>

          {/* GROUPS — merges leaderboard + per-group trend + heatmap */}
          <Card>
            <CardHead title="GROUPS" right={<Seg small options={['Ranked', 'Grid']} value={gv} onChange={setGv} />} />
            {gv === 'Ranked'
              ? <div>{d.ranked.map((g, i) => <RankedRow key={g.n} g={g} rank={i + 1} last={i === d.ranked.length - 1} />)}</div>
              : <Heatmap groups={d.groups} />}
          </Card>

          {/* TAKEAWAYS — common miss + the story sentences */}
          <Card>
            <CardHead title="TAKEAWAYS" />
            <Insight icon="trophy" color="#FF9500"><b style={{ fontWeight: 700 }}>{d.best.name}</b> led the floor at <b style={{ fontWeight: 700 }}>{d.best.rate}%</b> — cleanest group of the {tf === 'today' ? 'day' : tf === 'week' ? 'week' : 'season'}.</Insight>
            <Insight icon="alert" color="#FF3B30"><b style={{ fontWeight: 700 }}>{d.worstFalls.name}</b> owns <b style={{ fontWeight: 700 }}>{d.worstFalls.counts.bf + d.worstFalls.counts.mf} of {d.falls}</b> floor falls — spot it next.</Insight>
            <div style={{ boxShadow: 'none' }}>
              <Insight icon="flame" color="#007AFF"><b style={{ fontWeight: 700 }}>{d.topMiss.label}</b> is your top miss at <b style={{ fontWeight: 700 }}>{d.overall[d.topMiss.id]}</b> reps — most fixable error.</Insight>
            </div>
          </Card>

          {/* TIMELINE — the chronological replay */}
          <Card>
            <CardHead title="LATEST SESSION" right={<span style={{ font: '500 11px/1 var(--mono)', color: 'var(--label2)' }}>6:41–7:24p</span>} />
            <Tape />
          </Card>

          {/* actions */}
          <div style={{ display: 'flex', gap: 8 }}>
            <button className="no-tap" onClick={() => setShareOpen(true)} style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, padding: '13px', borderRadius: 13, border: 'none', background: 'var(--accent)', color: '#fff', font: '600 15px/1 var(--font)', cursor: 'pointer' }}>
              <Icon name="share" size={17} color="#fff" /> Create share cards
            </button>
            <button className="no-tap" style={{ flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, padding: '13px 16px', borderRadius: 13, border: 'none', background: 'var(--fill)', color: 'var(--label)', font: '600 15px/1 var(--font)', cursor: 'pointer' }}>
              <Icon name="download" size={17} color="var(--label)" /> CSV
            </button>
          </div>
          <div style={{ height: 6 }} />
        </div>
      </div>

      <TweaksPanel>
        <TweakSection label="Lens" />
        <TweakRadio label="Timeframe" value={t.timeframe} options={[{ value: 'today', label: 'Today' }, { value: 'week', label: 'Week' }, { value: 'all', label: 'All' }]} onChange={v => setTweak('timeframe', v)} />
        <TweakRadio label="Groups view" value={t.groupView} options={['Ranked', 'Grid']} onChange={v => setTweak('groupView', v)} />
        <TweakSection label="Display" />
        <TweakRadio label="Counter" value={t.counterStyle} options={['Odometer', 'Flip', 'Pop']} onChange={v => setTweak('counterStyle', v)} />
        <TweakColor label="App accent" value={t.accent} options={['#007AFF', '#34C759', '#FF9500', '#AF52DE', '#FF2D55']} onChange={v => setTweak('accent', v)} />
      </TweaksPanel>
    </IOSDevice>
    <div style={{ position: 'absolute', inset: 0, borderRadius: 48, overflow: 'hidden', pointerEvents: shareOpen ? 'auto' : 'none' }}>
      <ShareCardSheet open={shareOpen} tf={tf} onClose={() => setShareOpen(false)} />
    </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    // fit the 402x874 device into any viewport
    function fitStage(){
      const stage = document.getElementById('stage');
      if(!stage) return;
      const W = 402, H = 874, pad = 24;
      const s = Math.min((window.innerWidth - pad)/W, (window.innerHeight - pad)/H, 1.18);
      stage.style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', fitStage);
    // re-fit after React mounts
    const _t = setInterval(fitStage, 250);
    setTimeout(()=>clearInterval(_t), 2500);
    fitStage();
  </script>
</body>
</html>
